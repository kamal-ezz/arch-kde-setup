<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- Generic UI stacks: keep the preferred Latin fonts, add script-capable fallbacks. -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Inter</family>
      <family>Noto Sans Arabic</family>
      <family>Noto Naskh Arabic</family>
      <family>Noto Sans CJK JP</family>
      <family>Noto Sans CJK SC</family>
      <family>Noto Sans CJK TC</family>
      <family>Noto Sans CJK KR</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
      <family>Noto Naskh Arabic</family>
      <family>Amiri</family>
      <family>Noto Serif CJK JP</family>
      <family>Noto Serif CJK SC</family>
      <family>Noto Serif CJK TC</family>
      <family>Noto Serif CJK KR</family>
    </prefer>
  </alias>

  <alias>
    <family>monospace</family>
    <prefer>
      <family>MesloLGS NF</family>
      <family>Noto Sans Arabic</family>
      <family>Noto Naskh Arabic</family>
      <family>Noto Sans CJK JP</family>
      <family>Noto Sans CJK SC</family>
      <family>Noto Sans CJK TC</family>
      <family>Noto Sans CJK KR</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Web apps often request Roboto/Arial before sans-serif; make script fallbacks explicit. -->
  <match target="pattern">
    <test name="family" qual="any"><string>Roboto</string></test>
    <edit name="family" mode="append" binding="strong">
      <string>Noto Sans Arabic</string>
      <string>Noto Naskh Arabic</string>
      <string>Noto Sans CJK JP</string>
      <string>Noto Sans CJK SC</string>
      <string>Noto Sans CJK TC</string>
      <string>Noto Sans CJK KR</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" qual="any"><string>Arial</string></test>
    <edit name="family" mode="append" binding="strong">
      <string>Noto Sans Arabic</string>
      <string>Noto Naskh Arabic</string>
      <string>Noto Sans CJK JP</string>
      <string>Noto Sans CJK SC</string>
      <string>Noto Sans CJK TC</string>
      <string>Noto Sans CJK KR</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" qual="any"><string>Helvetica</string></test>
    <edit name="family" mode="append" binding="strong">
      <string>Noto Sans Arabic</string>
      <string>Noto Naskh Arabic</string>
      <string>Noto Sans CJK JP</string>
      <string>Noto Sans CJK SC</string>
      <string>Noto Sans CJK TC</string>
      <string>Noto Sans CJK KR</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" qual="any"><string>Liberation Sans</string></test>
    <edit name="family" mode="append" binding="strong">
      <string>Noto Sans Arabic</string>
      <string>Noto Naskh Arabic</string>
      <string>Noto Sans CJK JP</string>
      <string>Noto Sans CJK SC</string>
      <string>Noto Sans CJK TC</string>
      <string>Noto Sans CJK KR</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" qual="any"><string>Inter</string></test>
    <edit name="family" mode="append" binding="strong">
      <string>Noto Sans Arabic</string>
      <string>Noto Naskh Arabic</string>
      <string>Noto Sans CJK JP</string>
      <string>Noto Sans CJK SC</string>
      <string>Noto Sans CJK TC</string>
      <string>Noto Sans CJK KR</string>
    </edit>
  </match>

  <!-- CJK language-specific font selection. -->
  <match>
    <test name="lang" compare="contains"><string>ja</string></test>
    <edit name="family" mode="prepend_first" binding="strong">
      <string>Noto Sans CJK JP</string>
      <string>Noto Serif CJK JP</string>
    </edit>
  </match>

  <match>
    <test name="lang" compare="contains"><string>zh-cn</string></test>
    <edit name="family" mode="prepend_first" binding="strong">
      <string>Noto Sans CJK SC</string>
      <string>Noto Serif CJK SC</string>
    </edit>
  </match>

  <match>
    <test name="lang" compare="contains"><string>zh-tw</string></test>
    <edit name="family" mode="prepend_first" binding="strong">
      <string>Noto Sans CJK TC</string>
      <string>Noto Serif CJK TC</string>
    </edit>
  </match>

  <match>
    <test name="lang" compare="contains"><string>zh-hk</string></test>
    <edit name="family" mode="prepend_first" binding="strong">
      <string>Noto Sans CJK HK</string>
      <string>Noto Serif CJK HK</string>
    </edit>
  </match>

  <match>
    <test name="lang" compare="contains"><string>ko</string></test>
    <edit name="family" mode="prepend_first" binding="strong">
      <string>Noto Sans CJK KR</string>
      <string>Noto Serif CJK KR</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains"><string>ar</string></test>
    <test name="family" qual="any"><string>Roboto</string></test>
    <edit name="family" mode="prepend_first" binding="strong">
      <string>Noto Sans Arabic</string>
      <string>Noto Naskh Arabic</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains"><string>ar</string></test>
    <test name="family" qual="any"><string>Arial</string></test>
    <edit name="family" mode="prepend_first" binding="strong">
      <string>Noto Sans Arabic</string>
      <string>Noto Naskh Arabic</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains"><string>ar</string></test>
    <test name="family" qual="any"><string>Helvetica</string></test>
    <edit name="family" mode="prepend_first" binding="strong">
      <string>Noto Sans Arabic</string>
      <string>Noto Naskh Arabic</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains"><string>ar</string></test>
    <test name="family" qual="any"><string>Liberation Sans</string></test>
    <edit name="family" mode="prepend_first" binding="strong">
      <string>Noto Sans Arabic</string>
      <string>Noto Naskh Arabic</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains"><string>ar</string></test>
    <test name="family" qual="any"><string>Inter</string></test>
    <edit name="family" mode="prepend_first" binding="strong">
      <string>Noto Sans Arabic</string>
      <string>Noto Naskh Arabic</string>
    </edit>
  </match>

  <!-- Keep Arabic-capable fallbacks available without replacing Latin UI fonts. -->
  <match>
    <test name="lang" compare="contains"><string>ar</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="prepend_first" binding="strong">
      <string>Noto Naskh Arabic</string>
      <string>Noto Serif</string>
    </edit>
  </match>

  <!-- Arabic sans-serif fallback. -->
  <match>
    <test name="lang" compare="contains"><string>ar</string></test>
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend_first" binding="strong">
      <string>Noto Sans Arabic</string>
      <string>Noto Naskh Arabic</string>
    </edit>
  </match>

  <!-- Arabic monospace fallback. -->
  <match>
    <test name="lang" compare="contains"><string>ar</string></test>
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend_first" binding="strong">
      <string>Noto Sans Arabic</string>
      <string>Noto Naskh Arabic</string>
    </edit>
  </match>

  <!-- Global font rendering -->
  <match target="font">
    <edit name="antialias"  mode="assign"><bool>true</bool></edit>
    <edit name="hinting"    mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle"  mode="assign"><const>hintslight</const></edit>
    <edit name="rgba"       mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter"  mode="assign"><const>lcddefault</const></edit>
  </match>

</fontconfig>
